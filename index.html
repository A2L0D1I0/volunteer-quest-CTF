<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Переход к квесту...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f5;
            color: #2d4a22;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 30px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(45, 74, 34, 0.08);
            max-width: 400px;
        }
        .spinner {
            border: 4px solid rgba(45, 74, 34, 0.1);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border-left-color: #4CAF50;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 {
            margin: 0 0 10px 0;
            font-size: 20px;
        }
        p {
            color: #667e5f;
            margin: 0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2 id="status">Загрузка квеста...</h2>
        <p id="substatus">Перенаправляем вас на игровую страницу</p>
    </div>

    <script>
        const APP_KEY = 'ylsrbojp';
        
        function hexToStr(hex) {
            let str = '';
            for (let i = 0; i < hex.length; i += 2) {
                str += String.fromCharCode(parseInt(hex.substr(i, 2), 16));
            }
            return str;
        }
        
        async function doRedirect() {
            const urlParams = new URLSearchParams(window.location.search);
            const pointHash = urlParams.get('point');
            
            if (!pointHash) {
                document.getElementById('status').innerText = 'Ошибка входа';
                document.getElementById('substatus').innerText = 'Не указан хэш контрольной точки (?point=...).';
                document.querySelector('.spinner').style.display = 'none';
                return;
            }
            
            try {
                // Получаем текущую ссылку на туннель из keyvalue.immanuel.co
                const response = await fetch(`https://keyvalue.immanuel.co/api/KeyVal/GetValue/${APP_KEY}/tunnel_url`);
                if (!response.ok) {
                    throw new Error('Не удалось получить адрес сервера.');
                }
                
                let hexUrl = await response.text();
                // Убираем кавычки, которые возвращает API
                hexUrl = hexUrl.replace(/^"|"$/g, '').trim();
                
                if (!hexUrl) {
                    throw new Error('Адрес сервера пустой.');
                }
                
                const tunnelUrl = hexToStr(hexUrl);
                if (!tunnelUrl || !tunnelUrl.startsWith('http')) {
                    throw new Error('Декодированный адрес некорректен.');
                }
                
                // Очищаем адрес от лишних пробелов/переносов
                const cleanTunnelUrl = tunnelUrl.trim().replace(/\/$/, '');
                
                // Перенаправляем на локальный бэкенд
                window.location.href = `${cleanTunnelUrl}/checkpoint/${pointHash}`;
                
            } catch (error) {
                console.error(error);
                document.getElementById('status').innerText = 'Сервер квеста не запущен';
                document.getElementById('substatus').innerText = 'Пожалуйста, обратитесь к организаторам. Подробности: ' + error.message;
                document.querySelector('.spinner').style.display = 'none';
            }
        }
        
        // Запуск редиректа при загрузке страницы
        doRedirect();
    </script>
</body>
</html>
